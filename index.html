<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#110718">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Focus">
<link rel="manifest" href="/manifest.json">
<title>Focus · Gemma</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<style>
:root { --plum:#110718; --gold:#c9a84c; --gold-pale:#e8cc8c; --cream:#faf6ef; --muted:#8a7a62; --serif:'Cormorant Garamond',serif; --sans:'Jost',sans-serif; }
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
body { background:var(--plum); color:var(--muted); font-family:var(--sans); font-weight:300; min-height:100vh; display:flex; align-items:center; justify-content:center; text-align:center; padding:40px 24px; }
.wrap { max-width:480px; }
.eyebrow { font-size:0.65rem; letter-spacing:0.28em; text-transform:uppercase; color:var(--gold); display:block; margin-bottom:20px; }
h1 { font-family:var(--serif); font-size:clamp(2rem,6vw,3rem); font-weight:400; color:var(--cream); line-height:1.2; margin-bottom:20px; }
h1 em { font-style:italic; color:var(--gold-pale); font-weight:300; }
p { font-size:0.9rem; line-height:1.8; opacity:0.6; }
.rule { display:block; width:52px; height:1px; background:linear-gradient(90deg,transparent,var(--gold),transparent); margin:24px auto; }
</style>
</head>
<body>
<div class="wrap">
  <span class="eyebrow">✦ focus.gemmaserenity.com</span>
  <h1>Your briefing is<br><em>on its way.</em></h1>
  <span class="rule"></span>
  <p>The daily briefing script will populate this page automatically at 7:00 AM, 12:00 PM, and 5:00 PM. It reads your session notes, calendar, and prospect pipeline — then tells you exactly where you are and what to do next.</p>
</div>
</body>
</html>
